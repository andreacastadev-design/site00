<!DOCTYPE html>
<html lang="it">
<head>
	<title>Convenzioni Aziendali</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

	<!-- Css -->
	<style>
		.nav-pills .nav-link.active {
			background-color: #d00000;
			color: white;
		}

		.nav-pills .nav-link {
			background-color: #f0f0f0;
			color: #333;
		}
		.col-sm-8{
			background-color: #f0f0f0;
		}

		.container{
			display: grid;
            grid-template-columns: 4 4;
			padding: 10px;
            gap: 5px;
		}
		
		.mix {
			border-style: solid none none none;
			border-color: #d00000;
		}

		.card{
			margin-top: 5px;
			margin-bottom: 5px;
			box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
			display: none;
		}
		
		.btn{
			background-color: #d00000;
			box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
			color: #f0f0f0;
		}

		.btn-canc{
			align-items: stretch;
			float: right;
			background-color: #fff;
			border-radius: 12px;
			box-shadow: transparent 0 0 0 3px,rgba(18, 18, 18, .1) 0 6px 20px;
			box-sizing: border-box;
			color: #d00000;
			font-family: Inter,sans-serif;
			font-weight: 700;
			justify-content: center;
			line-height: 1;
			padding: 0.5rem 1rem;
			text-align: center;
			text-decoration: none;
			transition: box-shadow .2s,-webkit-box-shadow .2s;
			white-space: nowrap;
			border: 0;
			user-select: none;
			-webkit-user-select: none;
			touch-action: manipulation;

			display: none;
		}

		.btn-canc:hover {
		box-shadow: #d00000 0 0 0 3px, transparent 0 0 0 0;
		}
		
		.btn-addCat{
			display: none;
		}

		.btn-addCon{
			display: none;
		}

		.btnV2{
			background-color: #08a017;
			border-color: #08a017;
			color: #f0f0f0;
			padding: 5px;
			margin: 5px;
		}

		.logBtn{
			background-color: white;
			border-color: white;
		}

		.btn:hover {
			background-color: #fc5555;
			color: white;
		}

		.btn:active {
			transform: translateY(2px); 
		}

		.btn-login:active {
			transform: translateY(2px); 
		}

	</style>
</head>

<body>
	<div>
		<!--HEADER-->
		<div class="container-fluid p-5 " style="height:140px">
			<img class="img-fluid float-start" src="agbLogo.png" alt="AGB">
			
			<!-- Primo bottone-->
			<button id="btn1"class="logBtn float-end" style="border-radius: 25px;" data-bs-toggle="modal" data-bs-target="#loginModal">
				<img class="img-fluid" src="profileIcon.png" alt="admin login" style="width:50px;height:50px">
			</button>
			
			<!-- Secondo bottone-->
			<button id="btn2" class="logBtn float-end dropdown-toggle" style="display:none;border-radius: 25px;" data-bs-toggle="dropdown">
				<img class="img-fluid" src="profileIcon.png" alt="admin login" style="width:50px;height:50px">
			</button>
			<ul class="dropdown-menu" style="justify-content:center;">
				<li><h5 class="dropdown-header">Admin</h5></li>
				<li><button class="btn dropdown-item-text"  onclick="loadMainPage()">Esci</button></li>
			</ul>
				
			<h1 class="text-center">Convenzioni Aziendali</h1>
		</div>

		<!--MAIN CONTENT-->
		<div class="row container-fluid" >
			<!--BUTTONS (categorie) -->
			<div class="col-sm-4 p-3">
				
				<!--Buttons container-->
				<div id="btnList"> <h3>Categorie:</h3> </div>
				<button id="btn-addCat" type="button" class="btn btn-addCat m-1 mt-2" data-bs-toggle="modal" data-bs-target="#addCategoryModal">+ Aggiungi categoria</button>
			</div>

			<!--CARDS (convenzioni) -->
			<div class="col-sm-8 container-fluid p-3" style="min-height:600px">

				<!--Search bar-->
				<form class="d-flex m-1">
					<input class="form-control me-2" type="text" placeholder="Cerca...">
					<button class="btn btn-danger text-white" type="button">Cerca</button>
				</form>

				<!--Cards container-->
				<div id="cardList" class="container row"> </div>
				<button id="btn-addCon" type="button" class="btn btn-addCon m-1 mt-2" data-bs-toggle="modal" data-bs-target="#addContentModal">+ Aggiungi convenzione</button>

			</div>
		</div>

		<!--FOOTER-->
		<div class="mix text-bg-light text-center" style="height:25px">
			<p> © 2026 AGB — Tutti i diritti riservati. </p>
		</div>
	</div>


	<!-- Modal login -->
	<div id="loginModal" class="modal fade" tabindex="-1">
		<div class="modal-dialog">
			<div class="modal-content">
				
				<div class="modal-header">
					<h4 class="modal-title">Accedi</h4>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<div class="modal-body">
					<div class="form-group">
						<label for="usernameBox">Nome Utente</label>
						<input type="username" class="form-control shadow" id="usernameBox" placeholder="Nome Utente">
					</div> <br>
					<div class="form-group">
						<label for="passwordBox">Password</label>
						<input type="password" class="form-control shadow" id="passwordBox" placeholder="Password">
						<div class="text-danger" id="paragrafoErrore">
						</div>
					</div>
				</div>
				
				<div class="modal-footer">
					<button type="button" class="btnV2 btn-success rounded" onclick="checkPassword()">Accedi</button>
					<button type="button" class="btn" data-bs-dismiss="modal">Cancella</button>
				</div>
			</div>
		</div>
	</div>

	<!-- Modal Add Category -->
	<div id="addCategoryModal" class="modal modal-cat fade" tabindex="-1">
		<div class="modal-dialog">
			<div class="modal-content">
				
				<div class="modal-header">
					<h4 class="modal-title">Aggiungi Categoria</h4>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<div class="modal-body">
					<div class="form-group">
						<label for="usernameBox">Nome nuova categoria:</label>
						<input type="categoryName" class="form-control" id="categoryNameBox" placeholder="Nome">
					</div>
				</div>

				<div class="modal-footer">
					<button type="button" class="btnV2 btn-success rounded" onclick="addCategory()" data-bs-dismiss="modal">Aggiungi</button>
					<button type="button" class="btn" data-bs-dismiss="modal">Cancella</button>
				</div>
			</div>
		</div>
	</div>

	<!-- Modal Add Convention -->
	<div id="addContentModal" class="modal modal-con fade" tabindex="-1">
		<div class="modal-dialog">
			<div class="modal-content">
				
				<div class="modal-header">
					<h4 class="modal-title">Aggiungi Convenzione</h4>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<div class="modal-body">
					<div class="form-group">
						<label for="conventionBox">Nome nuova convenzione:</label>
						<input id="conventionBox" class="form-control" placeholder="Nome">
					</div>
					<div class="form-group">
						<label for="AssociatedCategoryBox">Associa a una categoria esistente:</label>
						<input id="AssociatedCategoryBox" class="form-control" placeholder="Categoria">
					</div>
					<div>
						<label for="descriptionBox">Descrizione dell'attività:</laber>
						<textarea id="descriptionBox" class="form-control" rows="3" cols="50"></textarea>
				    </div>
					<div class="form-group">
						<label for="locationBox">Posizione dell'attività:</label>
						<input id="locationBox" class="form-control" placeholder="Posizione">
					</div>
					<div class="form-group">
						<label for="telephoneBox">Numero di telefono:</label>
						<input id="telephoneBox" class="form-control" type="number" placeholder="Numero di telefono">
					</div>
				</div>

				<div class="modal-footer">
					<button type="button" class="btnV2 btn-success rounded" onclick="addConvention()" data-bs-dismiss="modal">Aggiungi</button>
					<button type="button" class="btn" data-bs-dismiss="modal">Cancella</button>
				</div>
			</div>
		</div>
	</div>

	<!-- JavaScript -->
	<script>
		var i=0;
		var loginBtn = document.getElementById("btn1");
		var toggleBtn = document.getElementById("btn2");
		var addCategoryBtn = document.getElementById("btn-addCat");
		var addConventionBtn = document.getElementById("btn-addCon"); 
		var cancelButton = document.getElementById("btn-canc-Con"); 
		
		// Get the appendConLocation element
		const appendConLocation = document.getElementById('cardList');

		class Convention
		{
			_name;
			_description;
			_position;
			_telephone;

			constructor(name, description, position, telephone) {
				this._name = name;
				this._description = description;
				this._position = position;
				this._telephone = telephone;
			}
		}

		class Category
		{
			_id;
			_name;
			_conventions;

			constructor(id, name) 
			{
				this._id = id;
				this._name = name;
				this._conventions = [];
			}

			Add(convention) 
			{
				this._conventions.push(convention);
			}
		}

		var categories = [];
				
		//------------------------------------------------------------

		document.addEventListener('DOMContentLoaded', initialize)
		
		function initialize()
		{			
			const _cat1 = new Category(1, "Tutto");
			const _cat2 = new Category(2, "Alimentari");
			const _cat3 = new Category(3, "Abbigliamento");
			const _cat4 = new Category(4, "Sport");
			const _cat5 = new Category(5, "Sanità");

			const _prix = new Convention     ("Prix", "descrizione mancante", "Bassano del Grappa", "0424 808347");
			const _aliper = new Convention   ("Alìper", "descrizione mancante", "Sanvito", "0424 808347");
			const _coop = new Convention     ("Coop", "descrizione mancante", "Pove del Grappa", "0424 808347");
			const _comunello = new Convention("Comunello sport fashion", "descrizione mancante", "Bassano del Grappa", "0424 808347");
			const _ivanTeam = new Convention ("Rafting Ivan Team", "Centro Nazionale Rafting e Canoa", "Solagna", "0424 558250");

			_cat2.Add(_prix); 
			_cat2.Add(_aliper);
			_cat2.Add(_coop);

			_cat3.Add(_comunello);

			_cat4.Add(_ivanTeam);

			categories.push(_cat1);
			categories.push(_cat2);
			categories.push(_cat3);
			categories.push(_cat4);
			categories.push(_cat5);


			loadData();

			InitializeCatAndCon();

			showContents('tutto');
		}

		function InitializeCatAndCon()
		{
			// Get the appendBtnLocation element
		    const appendBtnLocation = document.getElementById('btnList');
			
			categories.forEach(element => {
				const newBtn = document.createElement('button');
				newBtn.type = 'button';
				newBtn.id = "btn-" + element._id;
				newBtn.className = 'btn m-1 categ-btn';
				newBtn.textContent = element._name;

				element._conventions.forEach(contentElement => {
					const newCard1 = document.createElement('div');
					newCard1.className = "cont-card";

						const newCard2 = document.createElement('div');
						newCard2.className = "card shadow";
						newCard2.id = element._name.toLowerCase();

							const newCard3 = document.createElement('div');
							newCard3.className = "card-body";

								const newCardTitle = document.createElement('h5'); //<h5 class="card-title">Rafting Ivan Team</h5>
								newCardTitle.className = "card-title";
								newCardTitle.textContent = contentElement._name;

								const newCardText1 = document.createElement('p'); //<p class="card-text">Centro Nazionale Rafting e Canoa<br> Via Fontanazzi, 1, 36020 Solagna VI <br>Telefono: 0424 558250</p>
								newCardText1.className = "card-text";
								newCardText1.textContent = contentElement._description;
								
								const newCardText2 = document.createElement('p'); 
								newCardText2.className = "card-text";
								newCardText2.textContent = "Posizione: " + contentElement._position;

								const newCardText3 = document.createElement('p'); 
								newCardText3.className = "card-text";
								newCardText3.textContent = "Telefono: " + contentElement._telephone;

								const newCardBtn1 = document.createElement('a'); //<a href="#" class="btn">Vai alla pagina</a>
								newCardBtn1.href = "#";
								newCardBtn1.className = "btn";
								newCardBtn1.textContent = "Vai alla pagina";

								const newCardBtn2 = document.createElement('button');
								newCardBtn2.className = "btn-canc";
								newCardBtn2.id = "btn-canc-Con"
								newCardBtn2.role = "button";
								newCardBtn2.textContent = "Cancella";

								newCardBtn2.addEventListener("click", function(){
									
								});

								newCard3.appendChild(newCardTitle);		
								newCard3.appendChild(newCardText1);		
								newCard3.appendChild(newCardText2);	
								newCard3.appendChild(newCardText3);	
								newCard3.appendChild(newCardBtn1);	
								newCard3.appendChild(newCardBtn2);
							newCard2.appendChild(newCard3);	
						newCard1.appendChild(newCard2);	
					appendConLocation.appendChild(newCard1);		

				})

				newBtn.addEventListener("click", function(){
					showContents(element._name.toLowerCase());
				});
				
				// Append the div to the appendBtnLocation
				appendBtnLocation.appendChild(newBtn);
			})
		}	

		//-----------------------------------------------------------------------------------

		//stampa le prime categorie e convenzioni prestabilite all'inizio del programma
		

		//=== Categories ==============================================================================================

		//aggiunge una categoria con i parametri selezionati
		function addCategory()
		{
			i += 1;
			
			var catName = document.getElementById("categoryNameBox").value;
			const _cat = new Category(i, catName);

			var found = categories.some(function(cat) {
				return cat._name.toLowerCase() === catName.toLowerCase();  //returna true su found se trova corrispondenza
			});

			if (found)
			{
				alert("Categoria già presente! Inserisci una categoria utile.");
			}
			else if (catName === "")
			{
				alert("Categoria vuota! Controlla il nome inserito.");
			}
			else
			{
				categories.push(_cat);

				refreshCategories(_cat);

				saveToLocalStorage();
			}
		}

		function refreshCategories(_cat)
		{
			// Get the appendBtnLocation element
			const appendBtnLocation = document.getElementById('btnList');

			const newBtn = document.createElement('button');

			newBtn.type = 'button';
			newBtn.id = "btn-" + _cat._id;
			newBtn.className = 'btn m-1 categ-btn';
			newBtn.textContent = _cat._name;

			newBtn.addEventListener("click", function(){
				showContents(_cat._name.toLowerCase());
			});
			
			// Append the div to the appendBtnLocation
			appendBtnLocation.appendChild(newBtn);
		}

        //=== Conventions ==============================================================================================

		//aggiunge una convenzione con i parametri selezionati
		function addConvention()
		{
			var conName = document.getElementById("conventionBox").value;
			var conDescription = document.getElementById("descriptionBox").value;
			var conPosition = document.getElementById("locationBox").value;
			var conTelephone = document.getElementById("telephoneBox").value;
			const _con = new Convention(conName, conDescription, conPosition, conTelephone);

			var conCategoryName = document.getElementById("AssociatedCategoryBox").value.toLowerCase();

			//Cerchiamo l'oggetto categoria corrispondente nell'array categories
			var actualCategory = categories.find(function(cat) {
				if (cat._name.toLowerCase() === conCategoryName)
					return cat._name.toLowerCase();
			});

			//Controlliamo se la categoria esiste davvero
			if (typeof actualCategory != "undefined") {
				actualCategory.Add(_con);
				
				refreshConventions(_con, actualCategory);

				saveToLocalStorage();
			} else {
				alert("Categoria non trovata! Controlla il nome inserito.");
			}
		}

		function refreshConventions(_con, conCategory)
		{
			const newCard1 = document.createElement('div');
			newCard1.className = "cont-card";

				const newCard2 = document.createElement('div');
				newCard2.className = "card shadow";
				newCard2.id = conCategory._name.toLowerCase();

					const newCard3 = document.createElement('div');
					newCard3.className = "card-body";

						const newCardTitle = document.createElement('h5'); //<h5 class="card-title">Rafting Ivan Team</h5>
						newCardTitle.className = "card-title";
						newCardTitle.textContent = _con._name;

						const newCardText1 = document.createElement('p'); //<p class="card-text">Centro Nazionale Rafting e Canoa<br> Via Fontanazzi, 1, 36020 Solagna VI <br>Telefono: 0424 558250</p>
						newCardText1.className = "card-text";
						newCardText1.textContent = _con._description;
						
						const newCardText2 = document.createElement('p'); 
						newCardText2.className = "card-text";
						newCardText2.textContent = "Posizione: " + _con._position;

						const newCardText3 = document.createElement('p'); 
						newCardText3.className = "card-text";
						newCardText3.textContent = "Telefono: " + _con._telephone;

						const newCardBtn1 = document.createElement('a'); //<a href="#" class="btn">Vai alla pagina</a>
						newCardBtn1.href = "#";
						newCardBtn1.className = "btn";
						newCardBtn1.textContent = "Vai alla pagina";

						const newCardBtn2 = document.createElement('button');
						newCardBtn2.className = "btn-link";
						newCardBtn2.textContent = "Cancella";

						newCardBtn2.addEventListener("click", function(){
							
						});
						
						newCard3.appendChild(newCardTitle);		
						newCard3.appendChild(newCardText1);		
						newCard3.appendChild(newCardText2);	
						newCard3.appendChild(newCardText3);	
						newCard3.appendChild(newCardBtn1);	
						newCard3.appendChild(newCardBtn2);	
					newCard2.appendChild(newCard3);	
				newCard1.appendChild(newCard2);	
			appendConLocation.appendChild(newCard1);	
		}

		//--- Saving data ------------------------------------------------------------------------------

		function saveToLocalStorage()
		{
			//gli passo l'array di categorie da trasformare in JSON che poi viene salvato localmente
			localStorage.setItem("myElements", JSON.stringify(categories)); 
		}

		function removeFromLocalStorage()
		{
			localStorage.removeItem("myCat");
			localStorage.setItem("myElements", JSON.stringify(categories)); 
		}

		function loadData() {
			const storedData = localStorage.getItem("myElements");

			if(!storedData)
				return; //se storedData è vuoto si evita di fare tutto il caricamento

			const rawCategories = JSON.parse(storedData); //legge il JSON, dentro rawCategories c'è una stringa

			categories = rawCategories.map(rawCat => {
       			const trueCategory = new Category(rawCat._id, rawCat._name);

				rawCat._conventions.forEach(rawCon => {
					const trueConvention = new Convention(rawCon._name, rawCon._description, rawCon._position, rawCon._telephone);

					console.log(trueConvention);

					trueCategory.Add(trueConvention);
				});

				return trueCategory;
			});
		}

		//metodo per cambiare la visibilità da standard alla pagina admin
		function loadAdminPage()
		{
			toggleBtn.style.display = 'block';
			loginBtn.style.display = 'none';

			addCategoryBtn.style.display = 'block';
			addConventionBtn.style.display = 'block';

			cancelButton.style.display = 'block';
		}

		//serve per riportare tutto normale se si toglie modalita admin
		function loadMainPage()
		{
			toggleBtn.style.display = 'none';
			loginBtn.style.display = 'block';

			addCategoryBtn.style.display = 'none';
			addConventionBtn.style.display = 'none';

			cancelButton.style.display = 'none';
		}

		//metodo per contrtollare la password e il nome utente
		function checkPassword() {
			var rightUsername = "io"
		    var rightPassword = "123";
			var username = document.getElementById("usernameBox").value;
			var password = document.getElementById("passwordBox").value;
			
			if (password == rightPassword && username == rightUsername ) {
				loadAdminPage();
			}
			else{
				var paragraph = document.getElementById("paragrafoErrore")
				paragraph.textContent = "La password non è corretta, riprova.";
			}
		}

		//ID duplicati potrebbero causare problemi piu avanti sostituire con data-attributes??    data-tag
        //funzione per mostrare le convenzioni ogni volta che si preme un bottone
		function showContents(btnName) {                                             

			const arrCont = document.querySelectorAll(".card");

			// Cicliamo direttamente dentro la NodeList delle card
			for (var i = 0; i < arrCont.length; i++) 
			{				
				//se il bottone cliccato è il bottone tutto allora ogni convenzione viene mostrata
				if (btnName === "tutto") 
				{
					arrCont[i].style.display = "block";
				}
				else if (arrCont[i].id === btnName) // Controlliamo se l'id (o il name) della card corrente corrisponde al nome del bottone cliccato
				{
					arrCont[i].style.display = "block";
				} 
				else 
				{
					arrCont[i].style.display = "none";
				}
			}
		}
	</script>

</body>

</html>
